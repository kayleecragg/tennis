<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Match Break Notifier</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1f1f1f;
            --text-color: #e0e0e0;
            --accent: #4CAF50;
            --border-radius: 8px;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .controls-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Collapsible Section Styling */
        details.settings-row {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        details.settings-row summary {
            cursor: pointer;
            list-style: none;
            outline: none;
            user-select: none;
        }

        details.settings-row summary::-webkit-details-marker {
            display: none;
        }

        details.settings-row summary h3 {
            display: inline-block;
            margin: 0;
            font-size: 1.17em;
            color: var(--text-color);
        }

        details.settings-row summary h3::before {
            content: '\f0da';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.2s ease;
        }

        details[open].settings-row summary h3::before {
            transform: rotate(90deg);
        }

        .details-content {
            margin-top: 15px;
            padding-left: 20px;
        }

        .static-header {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .static-header h3 {
            margin: 0 0 15px 0;
        }

        #court-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .court-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            min-width: 140px;
        }

        .court-label-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .court-label-group label {
            cursor: pointer;
            margin: 0;
            font-size: 0.95em;
            user-select: none;
        }

        .court-label-group input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            margin: 0;
        }

        .mute-btn {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 1.1em;
            transition: transform 0.1s;
        }

        .mute-btn:hover {
            transform: scale(1.2);
        }

        .mute-btn.active {
            color: var(--accent);
        }

        .mute-btn.muted {
            color: #ff4c4c;
        }

        button.standard-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        button.standard-btn:hover {
            background: #444;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 6px;
            width: fit-content;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: var(--accent);
        }

        #notification-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 15px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            animation: slideIn 0.3s ease-out;
        }

        .log-time {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .log-message {
            font-weight: 500;
            font-size: 1.1em;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            background: var(--panel-bg);
            border-radius: var(--border-radius);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-satellite-dish"></i> Break Notifier</h1>

        <div class="controls-panel">

            <details class="settings-row" style="border-top: none; margin-top: 0; padding-top: 0;" open>
                <summary>
                    <h3>Select Courts to Monitor</h3>
                </summary>
                <div class="details-content">

                    <div class="volume-control" style="margin-bottom: 15px;">
                        <i class="fas fa-volume-down" style="color: #888;"></i>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" title="Volume">
                        <i class="fas fa-volume-up" style="color: #888;"></i>
                    </div>

                    <div style="margin-bottom: 15px; gap: 10px; display: flex;">
                        <button id="select-all" class="standard-btn">Select All</button>
                        <button id="deselect-all" class="standard-btn">Deselect All</button>
                    </div>
                    <div id="court-selector">Loading courts...</div>
                </div>
            </details>

            <div class="static-header">
                <h3>Notification Rules</h3>
                <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="odd-games-toggle">
                    Notify on ALL odd games &gt; 5 (7th, 9th, 11th, etc.) as "run 60s break"
                </label>
                <p style="color:#888; font-size:0.8em; margin-top:5px;">
                    Note: 3rd and 5th games are always tracked. Set completions run "squeezeback". Match ends run "180s
                    break".
                </p>
            </div>

        </div>

        <h3>Recent Alerts</h3>
        <div id="notification-log">
            <div class="empty-state">Waiting for events... (if you've recently refereshed, this will be empty)</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://rg-checkerboard.vercel.app/";
        let matchStates = {};
        let isFirstLoad = true;
        let selectedCourts = new Set(JSON.parse(localStorage.getItem('alertCourts') || '[]'));
        let mutedCourts = new Set(JSON.parse(localStorage.getItem('mutedCourts') || '[]'));
        let knownCourts = new Set(); // Tracks courts we've already rendered

        // --- VOLUME SETTINGS ---
        const volumeSlider = document.getElementById('volume-slider');
        const savedVolume = localStorage.getItem('dingVolume');

        if (savedVolume !== null) {
            volumeSlider.value = savedVolume;
        }

        volumeSlider.addEventListener('input', (e) => {
            localStorage.setItem('dingVolume', e.target.value);
        });

        volumeSlider.addEventListener('change', () => playDing());

        // --- AUDIO ---
        function playDing() {
            const vol = parseFloat(volumeSlider.value);
            if (vol === 0) return;

            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;

                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);

                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 1.2);
            } catch (err) {
                console.log("Audio ding failed.", err);
            }
        }

        // --- TAB FLASHING ---
        let flashInterval = null;
        let originalTitle = document.title;

        function startFlashingTab(courtName) {
            if (flashInterval) clearInterval(flashInterval);
            let isOriginal = true;
            flashInterval = setInterval(() => {
                document.title = isOriginal ? `[${courtName}] BREAK! ` : originalTitle;
                isOriginal = !isOriginal;
            }, 1000);
        }

        function stopFlashingTab() {
            if (flashInterval) {
                clearInterval(flashInterval);
                flashInterval = null;
                document.title = originalTitle;
            }
        }

        window.addEventListener('focus', stopFlashingTab);

        // --- LOGGING & NOTIFICATIONS ---
        function fireAlert(title, court, message) {
            if (!mutedCourts.has(court)) {
                playDing();
            }

            startFlashingTab(court);

            // Optional fallback if user manually granted permissions in browser
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body: message, requireInteraction: true });
            }

            const logContainer = document.getElementById('notification-log');
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
        <div class="log-time">${time}</div>
        <div class="log-message">${title} - ${message}</div>
      `;

            logContainer.prepend(entry);

            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // --- SETUP COURTS ---
        function renderCourts(courtNames) {
            const container = document.getElementById('court-selector');

            // Clear "Loading..." text on first successful fetch
            if (knownCourts.size === 0) container.innerHTML = '';

            courtNames.forEach(court => {
                if (knownCourts.has(court)) return; // Skip if already rendered
                knownCourts.add(court);

                const courtDiv = document.createElement('div');
                courtDiv.className = 'court-item';

                // Explicitly link label and checkbox by ID to guarantee clicks work
                const safeId = 'chk-' + court.replace(/\s+/g, '-');

                const labelGroup = document.createElement('div');
                labelGroup.className = 'court-label-group';

                const input = document.createElement('input');
                input.type = 'checkbox';
                input.id = safeId;
                input.value = court;
                input.checked = selectedCourts.has(court);

                const label = document.createElement('label');
                label.htmlFor = safeId;
                label.textContent = court;

                labelGroup.appendChild(input);
                labelGroup.appendChild(label);

                const muteBtn = document.createElement('button');
                muteBtn.className = mutedCourts.has(court) ? 'mute-btn muted' : 'mute-btn active';
                muteBtn.innerHTML = mutedCourts.has(court) ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                muteBtn.title = mutedCourts.has(court) ? "Unmute this court" : "Mute this court";

                muteBtn.style.display = input.checked ? 'block' : 'none';

                input.addEventListener('change', () => {
                    if (input.checked) {
                        selectedCourts.add(court);
                        muteBtn.style.display = 'block';
                    } else {
                        selectedCourts.delete(court);
                        muteBtn.style.display = 'none';
                    }
                    localStorage.setItem('alertCourts', JSON.stringify(Array.from(selectedCourts)));
                });

                muteBtn.onclick = () => {
                    if (mutedCourts.has(court)) {
                        mutedCourts.delete(court);
                        muteBtn.className = 'mute-btn active';
                        muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                        muteBtn.title = "Mute this court";
                    } else {
                        mutedCourts.add(court);
                        muteBtn.className = 'mute-btn muted';
                        muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                        muteBtn.title = "Unmute this court";
                    }
                    localStorage.setItem('mutedCourts', JSON.stringify(Array.from(mutedCourts)));
                };

                courtDiv.appendChild(labelGroup);
                courtDiv.appendChild(muteBtn);
                container.appendChild(courtDiv);
            });
        }

        // Select/Deselect All buttons
        document.getElementById('select-all').onclick = () => {
            const checkboxes = document.querySelectorAll('#court-selector input[type="checkbox"]');
            checkboxes.forEach(chk => {
                if (!chk.checked) chk.click(); // Programmatically click to trigger events
            });
        };

        document.getElementById('deselect-all').onclick = () => {
            const checkboxes = document.querySelectorAll('#court-selector input[type="checkbox"]');
            checkboxes.forEach(chk => {
                if (chk.checked) chk.click();
            });
        };

        // --- CORE POLLING LOGIC ---
        async function checkForUpdate() {
            try {
                const res = await fetch(API_BASE, { cache: 'no-store' });
                const data = await res.json();

                const courtNames = Object.keys(data);

                // Only try to render if the API actually returned courts
                if (courtNames.length > 0) {
                    if (isFirstLoad && selectedCourts.size === 0) {
                        selectedCourts = new Set(courtNames);
                        localStorage.setItem('alertCourts', JSON.stringify(Array.from(selectedCourts)));
                    }
                    renderCourts(courtNames);
                    isFirstLoad = false;
                } else if (knownCourts.size === 0) {
                    document.getElementById('court-selector').innerHTML = 'Waiting for active courts...';
                }

                const allowAllOdd = document.getElementById('odd-games-toggle').checked;

                courtNames.forEach(court => {
                    if (!selectedCourts.has(court)) return;

                    const matches = data[court];
                    matches.forEach(m => {
                        const stateId = m.id;

                        const setsHome = (m.score && m.score.sets && m.score.sets.home) ? m.score.sets.home : [];
                        const setsAway = (m.score && m.score.sets && m.score.sets.away) ? m.score.sets.away : [];
                        const setsLength = setsHome.length;

                        let gamesInCurrentSet = 0;
                        if (setsLength > 0) {
                            gamesInCurrentSet = setsHome[setsLength - 1] + setsAway[setsLength - 1];
                        }

                        const currentState = {
                            status: m.status,
                            setsLength: setsLength,
                            gamesInCurrentSet: gamesInCurrentSet
                        };

                        if (!isFirstLoad && matchStates[stateId]) {
                            const prev = matchStates[stateId];
                            const matchTitle = `[${court}] ${m.home} vs ${m.away}`;

                            if (prev.status !== 'finished' && currentState.status === 'finished') {
                                fireAlert(matchTitle, court, "run 180s break");
                            }
                            else if (
                                currentState.status === 'in_progress' &&
                                prev.setsLength > 0 &&
                                currentState.setsLength > prev.setsLength
                            ) {
                                fireAlert(matchTitle, court, "run squeezeback");
                            }
                            else if (
                                currentState.status === 'in_progress' &&
                                currentState.setsLength === prev.setsLength &&
                                currentState.gamesInCurrentSet > prev.gamesInCurrentSet
                            ) {
                                const tg = currentState.gamesInCurrentSet;
                                const isTargetOddGame = tg === 3 || tg === 5 || (allowAllOdd && tg > 5 && tg % 2 !== 0);

                                if (isTargetOddGame) {
                                    fireAlert(matchTitle, court, `run 60s break (Game ${tg})`);
                                }
                            }
                        }

                        matchStates[stateId] = currentState;
                    });
                });
            } catch (err) {
                console.error("Failed to fetch data", err);
            }
        }

        checkForUpdate();
        setInterval(checkForUpdate, 200);

    </script>
</body>

</html>
