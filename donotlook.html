<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Match Break Notifier</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1f1f1f;
            --text-color: #e0e0e0;
            --accent: #4CAF50;
            --border-radius: 8px;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .controls-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .controls-panel h3 {
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .settings-row {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        #court-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        button:hover {
            background: #444;
        }

        .btn-action {
            background: var(--accent);
            border: none;
            font-weight: bold;
        }

        .btn-action:hover {
            background: #45a049;
        }

        #notification-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 15px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            animation: slideIn 0.3s ease-out;
        }

        .log-time {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .log-message {
            font-weight: 500;
            font-size: 1.1em;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            background: var(--panel-bg);
            border-radius: var(--border-radius);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-satellite-dish"></i> Break Notifier</h1>

        <div class="controls-panel">
            <h3>1. Permissions</h3>
            <button id="enable-notifications" class="btn-action">
                <i class="fas fa-bell"></i> Enable Desktop Notifications
            </button>
            <span id="perm-status" style="margin-left: 10px; color: #888;"></span>

            <div class="settings-row">
                <h3>2. Select Courts to Monitor</h3>
                <div style="margin-bottom: 15px; gap: 10px; display: flex;">
                    <button id="select-all">Select All</button>
                    <button id="deselect-all">Deselect All</button>
                </div>
                <div id="court-selector">Loading courts...</div>
            </div>

            <div class="settings-row">
                <h3>3. Notification Rules</h3>
                <label>
                    <input type="checkbox" id="odd-games-toggle">
                    Notify on ALL odd games &gt; 5 (7th, 9th, 11th, etc.) as "run 60s break"
                </label>
                <p style="color:#888; font-size:0.8em; margin-top:5px;">
                    Note: 3rd and 5th games are always tracked. Set completions run "squeezeback". Match ends run "180s break".
                </p>
            </div>
        </div>

        <h3>Recent Alerts</h3>
        <div id="notification-log">
            <div class="empty-state">Waiting for events...</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://rg-checkerboard.vercel.app/";
        let matchStates = {};
        let isFirstLoad = true;
        let selectedCourts = new Set(JSON.parse(localStorage.getItem('alertCourts') || '[]'));
        let selectorsInitialized = false;

        // --- AUDIO: Single Synthesized "Ding" ---
        function playDing() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.type = 'sine';
                // Frequency 880Hz is a nice, bright A5 note
                osc.frequency.setValueAtTime(880, ctx.currentTime); 
                
                // Creates a percussive "hit" that fades out (a ding)
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 1.2);
            } catch (err) {
                console.log("Audio ding failed (usually due to lack of user interaction first).", err);
            }
        }

        // --- TAB FLASHING ---
        let flashInterval = null;
        let originalTitle = document.title;

        function startFlashingTab(courtName) {
            if (flashInterval) clearInterval(flashInterval);
            let isOriginal = true;
            flashInterval = setInterval(() => {
                document.title = isOriginal ? `🚨 [${courtName}] BREAK! 🚨` : originalTitle;
                isOriginal = !isOriginal;
            }, 1000);
        }

        function stopFlashingTab() {
            if (flashInterval) {
                clearInterval(flashInterval);
                flashInterval = null;
                document.title = originalTitle;
            }
        }

        // Stop flashing when user clicks back into the tab
        window.addEventListener('focus', stopFlashingTab);

        // --- PERMISSIONS LOGIC ---
        const permStatus = document.getElementById('perm-status');
        const enableBtn = document.getElementById('enable-notifications');

        function updatePermStatus() {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    permStatus.textContent = '(Granted)';
                    permStatus.style.color = '#4CAF50';
                    enableBtn.style.display = 'none';
                } else if (Notification.permission === 'denied') {
                    permStatus.textContent = '(Denied - Check Browser Settings)';
                    permStatus.style.color = '#ff4c4c';
                }
            }
        }

        updatePermStatus();

        enableBtn.addEventListener('click', () => {
            Notification.requestPermission().then(permission => {
                updatePermStatus();
                if (permission === 'granted') {
                    new Notification('System Ready', { body: 'You will now receive break alerts.' });
                }
            });
            // Play test ding to confirm sound works and unlock browser audio policy
            playDing();
        });

        // --- LOGGING & NOTIFICATIONS ---
        function fireAlert(title, court, message) {
            // 1. Play Sound
            playDing();

            // 2. Flash Tab
            startFlashingTab(court);

            // 3. Desktop Notification
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body: message, requireInteraction: true });
            }

            // 4. UI Log
            const logContainer = document.getElementById('notification-log');
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
        <div class="log-time">${time}</div>
        <div class="log-message">${title} - ${message}</div>
      `;

            logContainer.prepend(entry);

            // Keep only last 50 logs
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // --- SETUP COURTS ---
        function initSelectors(courtNames) {
            const container = document.getElementById('court-selector');
            container.innerHTML = '';

            if (isFirstLoad && selectedCourts.size === 0) {
                selectedCourts = new Set(courtNames);
                localStorage.setItem('alertCourts', JSON.stringify(Array.from(selectedCourts)));
            }

            courtNames.forEach(court => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.value = court;
                input.checked = selectedCourts.has(court);

                input.onchange = () => {
                    if (input.checked) selectedCourts.add(court);
                    else selectedCourts.delete(court);
                    localStorage.setItem('alertCourts', JSON.stringify(Array.from(selectedCourts)));
                };

                label.appendChild(input);
                label.appendChild(document.createTextNode(court));
                container.appendChild(label);
            });

            document.getElementById('select-all').onclick = () => {
                selectedCourts = new Set(courtNames);
                localStorage.setItem('alertCourts', JSON.stringify(Array.from(selectedCourts)));
                initSelectors(courtNames);
            };

            document.getElementById('deselect-all').onclick = () => {
                selectedCourts.clear();
                localStorage.setItem('alertCourts', JSON.stringify([]));
                initSelectors(courtNames);
            };

            selectorsInitialized = true;
        }

        // --- CORE POLLING LOGIC ---
        async function checkForUpdate() {
            try {
                const res = await fetch(API_BASE, { cache: 'no-store' });
                const data = await res.json();

                const courtNames = Object.keys(data);
                if (!selectorsInitialized) initSelectors(courtNames);

                const allowAllOdd = document.getElementById('odd-games-toggle').checked;

                courtNames.forEach(court => {
                    if (!selectedCourts.has(court)) return;

                    const matches = data[court];
                    matches.forEach(m => {
                        const stateId = m.id;

                        // Calculate current match metrics safely
                        const setsHome = (m.score && m.score.sets && m.score.sets.home) ? m.score.sets.home : [];
                        const setsAway = (m.score && m.score.sets && m.score.sets.away) ? m.score.sets.away : [];
                        const setsLength = setsHome.length;

                        let gamesInCurrentSet = 0;
                        if (setsLength > 0) {
                            gamesInCurrentSet = setsHome[setsLength - 1] + setsAway[setsLength - 1];
                        }

                        const currentState = {
                            status: m.status,
                            setsLength: setsLength,
                            gamesInCurrentSet: gamesInCurrentSet
                        };

                        // Evaluate state changes
                        if (!isFirstLoad && matchStates[stateId]) {
                            const prev = matchStates[stateId];
                            const matchTitle = `[${court}] ${m.home} vs ${m.away}`;

                            // 1. MATCH FINISHED -> 180s break
                            if (prev.status !== 'finished' && currentState.status === 'finished') {
                                fireAlert(matchTitle, court, "run 180s break");
                            }
                            // 2. SET CONCLUDED -> squeezeback (Fix: ensure prev.setsLength > 0 so it ignores first set start)
                            else if (
                                currentState.status === 'in_progress' && 
                                prev.setsLength > 0 && 
                                currentState.setsLength > prev.setsLength
                            ) {
                                fireAlert(matchTitle, court, "run squeezeback");
                            }
                            // 3. GAME COMPLETED -> 60s break check
                            else if (
                                currentState.status === 'in_progress' &&
                                currentState.setsLength === prev.setsLength &&
                                currentState.gamesInCurrentSet > prev.gamesInCurrentSet
                            ) {
                                const tg = currentState.gamesInCurrentSet;
                                const isTargetOddGame = tg === 3 || tg === 5 || (allowAllOdd && tg > 5 && tg % 2 !== 0);

                                if (isTargetOddGame) {
                                    fireAlert(matchTitle, court, `run 60s break (Game ${tg})`);
                                }
                            }
                        }

                        // Save state for next tick
                        matchStates[stateId] = currentState;
                    });
                });

                isFirstLoad = false;
            } catch (err) {
                console.error("Failed to fetch data", err);
            }
        }

        // Initialize and run poll every 4 seconds
        checkForUpdate();
        setInterval(checkForUpdate, 4000);
    </script>
</body>

</html>
